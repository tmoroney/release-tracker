name: Daily Download Snapshot

on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and record snapshot
        run: |
          SNAPSHOT_FILE="data/snapshots.json"

          # Initialize file if it doesn't exist
          if [ ! -f "$SNAPSHOT_FILE" ]; then
            echo '[]' > "$SNAPSHOT_FILE"
          fi

          # Fetch release data from GitHub API
          RELEASES=$(curl -s "https://api.github.com/repos/tmoroney/auto-subs/releases?per_page=100")

          # Use node to process the data and append snapshot
          node -e "
            const fs = require('fs');
            const releases = JSON.parse(process.argv[1]);
            const snapshots = JSON.parse(fs.readFileSync('$SNAPSHOT_FILE', 'utf8'));

            const EXTENSIONS = ['.pkg', '.deb', '.exe'];
            const isInstaller = name => EXTENSIONS.some(ext => name.toLowerCase().endsWith(ext));

            let totalInstallerDownloads = 0;
            let latestJsonDownloads = 0;
            let latestJsonRelease = null;
            const perRelease = {};

            for (const release of releases) {
              if (!release.assets) continue;

              // Find latest.json from the newest release that has one
              if (!latestJsonRelease) {
                const lj = release.assets.find(a => a.name === 'latest.json');
                if (lj) {
                  latestJsonDownloads = lj.download_count;
                  latestJsonRelease = release.tag_name;
                }
              }

              let releaseTotal = 0;
              for (const asset of release.assets) {
                if (isInstaller(asset.name)) {
                  releaseTotal += asset.download_count;
                }
              }
              if (releaseTotal > 0) {
                perRelease[release.tag_name] = releaseTotal;
                totalInstallerDownloads += releaseTotal;
              }
            }

            const snapshot = {
              timestamp: new Date().toISOString(),
              totalInstallerDownloads,
              latestJsonDownloads,
              latestJsonRelease,
              perRelease,
            };

            snapshots.push(snapshot);
            fs.writeFileSync('$SNAPSHOT_FILE', JSON.stringify(snapshots, null, 2));
            console.log('Snapshot recorded:', JSON.stringify(snapshot, null, 2));
          " "$RELEASES"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "snapshot: daily download counts $(date -u +%Y-%m-%d)"
          git push
